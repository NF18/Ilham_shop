    <!-- CONTACT -->

    <section class="contact-section">
      <h1>Contact Us</h1>

      <h3>Ada pertanyaan? Kirimkan pesan kepada kami.</h3>

      <form class="contact-form">
        <div class="input-group">
          <div>
            <label>Email</label>
            <input type="email" placeholder="Masukkan email Anda" />
          </div>

          <div>
            <label>Nama</label>
            <input type="text" placeholder="Masukkan nama Anda" />
          </div>
        </div>

        <button type="submit">KIRIM</button>
      </form>
    </section>

    <!-- INFO CARD -->

    <section class="info-wrapper">
      <div class="info-card">
        <div class="info-item">
          <div class="icon">
            <i class="fas fa-store"></i>
          </div>

          <h2>TENTANG TOKO</h2>

          <p>Produk berkualitas, pelayanan terbaik, harga terjangkau.</p>
        </div>

        <div class="info-item">
          <div class="icon">
            <i class="fas fa-phone"></i>
          </div>

          <h2>TELEPON</h2>

          <p>
            +6285780327624
            <br />
          </p>
        </div>

        <div class="info-item">
          <div class="icon">
            <i class="fas fa-location-dot"></i>
          </div>

          <h2>ALAMAT TOKO</h2>

          <p>
            Jl.pancawarga 22
            <br />
            Jakarta Timur, Indonesia
          </p>
        </div>
      </div>
    </section>
